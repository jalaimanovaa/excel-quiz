const NP = "https://api.npoint.io/efd667bce617571723b4";

async function dbLoad(){
  try{
    const r=await fetch(NP+"?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)return lLoad();
    const d=await r.json();
    return Array.isArray(d.participants)?d.participants:[];
  }catch{return lLoad();}
}
async function dbSave(p){
  try{
    const cur=await dbLoad();
    const i=cur.findIndex(x=>x.name===p.name);
    if(i>=0)cur[i]=p;else cur.push(p);
    await fetch(NP,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({participants:cur})});
    lSave(cur);
    return true;
  }catch{
    const cur=lLoad();
    const i=cur.findIndex(x=>x.name===p.name);
    if(i>=0)cur[i]=p;else cur.push(p);
    lSave(cur);
    return false;
  }
}
async function dbClear(){
  try{
    await fetch(NP,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({participants:[]})});
    lSave([]);
  }catch{lSave([]);}
}
function lLoad(){try{const s=localStorage.getItem("qbkp");return s?JSON.parse(s):[]}catch{return[]}}
function lSave(l){try{localStorage.setItem("qbkp",JSON.stringify(l))}catch{}}

function render(){

  app.innerHTML="";
  const el=buildScreen();
  app.appendChild(el);
}

function el(tag,attrs={},children=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style")Object.assign(e.style,v);
    else if(k==="class")e.className=v;
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="html")e.innerHTML=v;
    else e.setAttribute(k,v);
  }
  for(const c of children){
    if(c==null||c===false||c===undefined)continue;
    if(typeof c==="string"||typeof c==="number")e.appendChild(document.createTextNode(String(c)));
    else e.appendChild(c);
  }
  return e;
}
const div=(a,c)=>el("div",a,c);
const btn=(a,c)=>el("button",a,c);
const inp=(a)=>el("input",a);
const span=(a,c)=>el("span",a,c);
const p=(a,c)=>el("p",a,c);
const h=(t,a,c)=>el("h"+t,a,c);

function card(style={},children=[]){

}

function buildScreen(){

async function tgSend(text){
  // Use GET with URLSearchParams - works cross-origin (Telegram allows GET for sendMessage)
  try{
    const url="https://api.telegram.org/bot"+TG_TOKEN+"/sendMessage"
      +"?chat_id="+encodeURIComponent(TG_CHAT)
      +"&text="+encodeURIComponent(text);
    const res=await fetch(url,{method:"GET",mode:"cors"});
    const json=await res.json();
    console.log("TG sent:",json.ok);
  }catch(e){
    // Fallback: script tag JSONP-style
    console.log("TG fetch failed:",e);
    try{
      const s=document.createElement("script");
      s.src="https://api.telegram.org/bot"+TG_TOKEN+"/sendMessage"
        +"?chat_id="+encodeURIComponent(TG_CHAT)
        +"&text="+encodeURIComponent(text.substring(0,400));
      document.head.appendChild(s);
      await new Promise(r=>setTimeout(r,2000));
      s.remove();
    }catch(e2){console.log("TG fallback failed:",e2);}
  }
}

async function tgBlock(name,blockNum,qs,ans){
  // Send results for questions blockNum*20 to blockNum*20+19
  const NL="\n";
  const start=blockNum*20;
  const end=start+20;
  const blockQs=qs.slice(start,end);
  const correct=blockQs.filter(q=>ans[q.id]===q.c).length;
  const wrong=blockQs.filter(q=>ans[q.id]!==q.c);
  const wlist=wrong.map((q,i)=>
    (i+1)+". S"+q.id+": "+q.q.substring(0,50)+"..."+NL+
    "   Cavab: "+(q.o[ans[q.id]]||"Bos").substring(0,35)+NL+
    "   Dogru: "+q.o[q.c].substring(0,35)
  ).join(NL);
  const msg=[
    "=== BLOK "+(blockNum+1)+"/5 === "+name,
    "Suallar: "+(start+1)+"-"+end,
    "Dogru: "+correct+"/20",
    "Yanlish: "+wrong.length+"/20",
    wrong.length>0?"------ Yanlishlar ------":"Hamisi dogru! ",
    wlist
  ].filter(Boolean).join(NL);
  await tgSend(msg);
}

async function tgOpenQ(name,openAns){
  const NL="\n";
  const lines=["oq1","oq2","oq3","oq4","oq5"].map((id,i)=>
    "--- Aciq "+(i+1)+" ---"+NL+(openAns[id]||"Cavablanmayib").substring(0,300)
  ).join(NL);
  const msg=["ACIQ SUALLAR - "+name,"================================",lines].join(NL);
  await tgSend(msg);
}

async function tgTask(name,taskAns,dur){
  const NL="\n";
  const lines=[0,1,2,3,4].map(i=>
    "--- Tapshiriq "+(i+1)+" ---"+NL+(taskAns["t"+i]||"Cavablanmayib").substring(0,300)
  ).join(NL);
  const msg=["REAL TAPSHIRIQ - "+name+" ("+dur+" deq)","================================",lines].join(NL);
  await tgSend(msg);
}

async function finishQuiz(){
  if(S.saving)return;
  setState({saving:true});
  const score=QS.reduce((a,q)=>a+(S.ans[q.id]===q.c?1:0),0);
  const pct=Math.round(score/QS.length*100);
  const wrong=QS.filter(q=>S.ans[q.id]!==q.c);
  const dur=Math.round((Date.now()-S.t0)/60000);
  const name=S.name+" "+S.surname;
  const result={name,score,total:QS.length,pct,ans:S.ans,openAns:S.openAns,taskAns:S.taskAns,completedAt:new Date().toLocaleString("az-AZ"),dur};
  // Save to DB
  dbSave(result).catch(()=>{});
  // Send task answers to Telegram (non-blocking)
  tgTask(name,S.taskAns,dur).catch(()=>{});
  setState({saving:false,result,screen:"result"});
}

// Called when 100 questions done - sends 5 blocks of 20
async function after100(){
  const name=S.name+" "+S.surname;
  for(let i=0;i<5;i++){
    await tgBlock(name,i,QS,S.ans);
  }
}

// Called when open questions done
async function afterOpenQ(){
  tgOpenQ(S.name+" "+S.surname,S.openAns).catch(()=>{});
}

function buildRing(pct,size){
  const r=28,cx=40,cy=40,circ=2*Math.PI*r;
  const g=grade(pct);
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("viewBox","0 0 80 80");
  const bg=document.createElementNS("http://www.w3.org/2000/svg","circle");
  bg.setAttribute("cx",cx);bg.setAttribute("cy",cy);bg.setAttribute("r",r);
  bg.setAttribute("fill","none");bg.setAttribute("stroke","rgba(255,255,255,.07)");bg.setAttribute("stroke-width","8");
  svg.appendChild(bg);
  const arc=document.createElementNS("http://www.w3.org/2000/svg","circle");
  arc.setAttribute("cx",cx);arc.setAttribute("cy",cy);arc.setAttribute("r",r);
  arc.setAttribute("fill","none");arc.setAttribute("stroke",g.c);arc.setAttribute("stroke-width","8");
  arc.setAttribute("stroke-dasharray",circ);arc.setAttribute("stroke-dashoffset",circ*(1-pct/100));
  arc.setAttribute("stroke-linecap","round");arc.setAttribute("transform","rotate(-90 "+cx+" "+cy+")");
  arc.style.transition="stroke-dashoffset 1s ease";
  svg.appendChild(arc);
  const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
  txt.setAttribute("x",cx);txt.setAttribute("y",cy+1);txt.setAttribute("text-anchor","middle");
  txt.setAttribute("dominant-baseline","middle");txt.setAttribute("fill",g.c);
  txt.setAttribute("font-size","15");txt.setAttribute("font-weight","800");txt.setAttribute("font-family","Syne");
  txt.textContent=pct+"%";
  svg.appendChild(txt);
  return svg;
}

function pickAnswerQ(idx){

function nextQQ(){
  const nextIdx=S.qi+1;
  // Every 20 questions, send a block report (after q20, q40, q60, q80)
  if(nextIdx>0 && nextIdx%20===0 && nextIdx<QS.length){
    const blockNum=Math.floor(S.qi/20);
    tgBlock(S.name+" "+S.surname,blockNum,QS,S.ans).catch(()=>{});
  }
  if(S.qi<QS.length-1){
    setState({qi:nextIdx,sel:null,showExp:false});
  } else {
    // Send last block (81-100) then go to open questions
    const lastBlock=Math.floor(S.qi/20);
    tgBlock(S.name+" "+S.surname,lastBlock,QS,S.ans).catch(()=>{});
    setState({screen:"quiz-open",qi:QS.length,sel:null,showExp:false});
  }
}

// ═══════════════════════════════════════════
// LIVE POLLING (admin panel)
// ═══════════════════════════════════════════
let pollInterval=null;
const origSetState=setState;
function setState(patch){
  Object.assign(S,patch);
  if(S.screen==="admin"&&!pollInterval){
    pollInterval=setInterval(async()=>{
      if(S.screen!=="admin"){clearInterval(pollInterval);pollInterval=null;return;}
      const fresh=await dbLoad();
      if(fresh.length>S.participants.length){
        const prevNames=new Set(S.participants.map(p=>p.name));
        const newOnes=fresh.filter(p=>!prevNames.has(p.name));
        if(newOnes.length>0){
          const newest=newOnes[newOnes.length-1];
          S.newAlert={name:newest.name,pct:newest.pct};
          S.pulse=true;
          setTimeout(()=>{S.pulse=false;},600);
          setTimeout(()=>{S.newAlert=null;if(S.screen==="admin")render();},5000);
        }
      }
      S.participants=fresh.length>=S.participants.length?fresh:S.participants;
      render();
    },4000);
  }
  if(S.screen!=="admin"&&pollInterval){clearInterval(pollInterval);pollInterval=null;}
  render();
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
</script>
